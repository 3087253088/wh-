
  server:
    port: 8080

  spring:
    application:
      name: smart-finance-backend

    datasource:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/smart_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      username: root
      password: 1234

    jackson:
      date-format: yyyy-MM-dd HH:mm:ss
      time-zone: GMT+8

  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # JWT配置
  jwt:
    secret: smart-finance-secret-key-2024-spring-boot-3-jdk21
    expiration: 604800000  # 7天

  # 文件上传配置
  file:
    upload-path: D:/upload/
    avatar-path: D:/upload/avatar/
    invoice-path: D:/upload/invoice/

